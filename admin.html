<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Bare Minimum</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="main-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="dot"></span>
        Bare Minimum
      </a>
      <div class="nav-links" id="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html" class="nav-cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="container" style="padding: 120px 0 60px;">
    <h2>Admin Dashboard</h2>
    <div class="divider"></div>
    <p style="margin-bottom: 2rem;">Welcome to the administrative area. Here you can manage the application.</p>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem;">
      <div style="background: var(--cream); padding: 2rem; border-radius: 8px;">
        <h3>Sales Overview</h3>
        <p style="font-size: 2rem; color: var(--copper); margin: 1rem 0;">₹3,40,000</p>
        <p>Total revenue this week</p>
      </div>
      
      <div style="background: var(--cream); padding: 2rem; border-radius: 8px;">
        <h3>Active Users</h3>
        <p style="font-size: 2rem; color: var(--copper); margin: 1rem 0;">128</p>
        <p>Users online today</p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Admin protection
      const user = auth.getCurrentUser();
      if (!user || user.role !== 'admin') {
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
