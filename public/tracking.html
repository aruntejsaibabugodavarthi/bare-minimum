<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order — Bare Minimum</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='8' fill='%23c49a6c'/%3E%3C/svg%3E">
  <style>
    .tracking-container { max-width: 800px; margin: 4rem auto; padding: 0 5%; }
    .tracking-header { margin-bottom: 2rem; text-align: center; }
    .tracking-header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    
    .tracking-form { display: flex; gap: 1rem; margin-bottom: 3rem; justify-content: center; max-width: 500px; margin-left: auto; margin-right: auto; }
    .tracking-form input { flex: 1; padding: 12px 16px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    .tracking-form button { padding: 12px 24px; background: var(--charcoal); color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    
    .order-card { border: 1px solid #eaeaea; border-radius: 8px; padding: 2rem; background: #fafafa; display: none; }
    .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 1rem; margin-bottom: 1rem; }
    .order-header h3 { font-size: 1.2rem; }
    .order-meta { font-size: 0.9rem; color: #666; }
    
    .status-timeline { display: flex; justify-content: space-between; align-items: center; margin-top: 2rem; position: relative; }
    .status-timeline::before { content: ''; position: absolute; top: 12px; left: 10%; right: 10%; height: 2px; background: #ddd; z-index: 1; }
    .status-step { position: relative; z-index: 2; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .status-dot { width: 26px; height: 26px; border-radius: 50%; background: #fff; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    .status-step.completed .status-dot { background: var(--charcoal); border-color: var(--charcoal); color: #fff; }
    .status-step.active .status-dot { border-color: var(--charcoal); box-shadow: 0 0 0 4px rgba(17,17,17,0.1); }
    .status-label { font-size: 0.8rem; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-step.completed .status-label, .status-step.active .status-label { color: var(--charcoal); }

    .error-message { color: red; text-align: center; margin-bottom: 2rem; display: none; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="main-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="dot"></span> Bare Minimum
      </a>
      <div class="nav-links" id="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="tracking.html">Track Order</a>
                <a href="cart.html" class="nav-cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="tracking-container">
    <div class="tracking-header">
      <h1>Track Your Order</h1>
      <p style="color: #666;">Enter your order ID below to see the current status.</p>
    </div>

    <form class="tracking-form" id="tracking-form">
      <input type="text" id="order-id-input" placeholder="e.g. order_cod_12345678" required>
      <button type="submit">Track</button>
    </form>

    <div id="error-message" class="error-message"></div>

    <div id="order-result" class="order-card">
      <div class="order-header">
        <div>
          <h3 id="res-order-id"></h3>
          <div class="order-meta" id="res-order-meta"></div>
        </div>
        <a href="#" id="res-invoice-link" style="color: var(--charcoal); font-weight: 500; font-size: 0.9rem;">View Invoice</a>
      </div>
      <div style="font-size: 0.95rem; margin-bottom: 1rem; color: #444;" id="res-items"></div>
      
      <div id="res-timeline"></div>
    </div>
  </main>

  <script src="js/common.js"></script>
  <script>
    document.getElementById('tracking-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const orderId = document.getElementById('order-id-input').value.trim();
      const errEl = document.getElementById('error-message');
      const resEl = document.getElementById('order-result');

      errEl.style.display = 'none';
      resEl.style.display = 'none';

      try {
        const response = await fetch(`/api/orders/track/${orderId}`);
        const data = await response.json();

        if (!data.success) {
          errEl.textContent = 'Order not found. Please check the ID and try again.';
          errEl.style.display = 'block';
          return;
        }

        renderOrderResult(data.order);
      } catch (err) {
        errEl.textContent = 'Network error. Please try again later.';
        errEl.style.display = 'block';
      }
    });

    function renderOrderResult(order) {
      const date = new Date(order.date).toLocaleDateString();
      const itemsText = order.items.map(i => `${i.quantity}x ${i.name}`).join(', ');
      
      document.getElementById('res-order-id').textContent = `Order #${order.id}`;
      document.getElementById('res-order-meta').textContent = `Placed on ${date} • ₹${order.amount}`;
      document.getElementById('res-items').innerHTML = `<strong>Items:</strong> ${itemsText}`;
      document.getElementById('res-invoice-link').href = `invoice.html?id=${order.id}`;

      const statuses = ['created', 'placed', 'processing', 'shipped', 'delivered'];
      const currentIndex = Math.max(0, statuses.indexOf(order.status));
      
      let timelineHTML = '<div class="status-timeline">';
      ['Placed', 'Processing', 'Shipped', 'Delivered'].forEach((label, idx) => {
        const stepIndex = idx + 1; 
        const isCompleted = currentIndex >= stepIndex;
        const isActive = currentIndex === stepIndex;
        const stateClass = isCompleted ? 'completed' : (isActive ? 'active' : '');
        
        let iconHTML = '';
        if (isCompleted && !isActive) {
          iconHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        }

        timelineHTML += `
          <div class="status-step ${stateClass}">
            <div class="status-dot">${iconHTML}</div>
            <div class="status-label">${label}</div>
          </div>
        `;
      });
      timelineHTML += '</div>';

      document.getElementById('res-timeline').innerHTML = timelineHTML;
      document.getElementById('order-result').style.display = 'block';
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</body>
</html>
