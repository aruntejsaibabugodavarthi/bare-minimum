<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — Bare Minimum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='8' fill='%23c49a6c'/%3E%3C/svg%3E">
  <style>
    .account-container { max-width: 1000px; margin: 0 auto; padding: 6rem 5% 2rem; }
    .account-header { margin-bottom: 3rem; }
    .account-header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .order-card { border: 1px solid #eaeaea; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; background: #fafafa; }
    .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 1rem; margin-bottom: 1rem; }
    .order-header h3 { font-size: 1.2rem; }
    .order-meta { font-size: 0.9rem; color: #666; }
    
    .status-timeline { display: flex; justify-content: space-between; align-items: center; margin-top: 1.5rem; position: relative; }
    .status-timeline::before { content: ''; position: absolute; top: 12px; left: 10%; right: 10%; height: 2px; background: #ddd; z-index: 1; }
    .status-step { position: relative; z-index: 2; text-align: center; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .status-dot { width: 26px; height: 26px; border-radius: 50%; background: #fff; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
    .status-step.completed .status-dot { background: var(--charcoal); border-color: var(--charcoal); color: #fff; }
    .status-step.active .status-dot { border-color: var(--charcoal); box-shadow: 0 0 0 4px rgba(17,17,17,0.1); }
    .status-label { font-size: 0.8rem; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
    .status-step.completed .status-label, .status-step.active .status-label { color: var(--charcoal); }

    .account-layout { display: flex; gap: 3rem; align-items: flex-start; }
    
    .account-sidebar { flex: 0 0 250px; display: flex; flex-direction: column; gap: 0.5rem; border-right: 1px solid #eaeaea; padding-right: 1.5rem; }
    .tab-btn { background: none; border: none; padding: 1rem 1.5rem; font-size: 0.9rem; cursor: pointer; color: #888; font-weight: 500; border-left: 3px solid transparent; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.2s; text-align: left; }
    .tab-btn:hover { color: var(--charcoal); background: #fafafa; }
    .tab-btn.active { color: var(--charcoal); border-left-color: var(--charcoal); background: #fafafa; font-weight: 600; }
    
    .account-content-area { flex: 1; min-width: 0; }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    @media (max-width: 768px) {
      .account-layout { flex-direction: column; gap: 2rem; }
      .account-sidebar { flex: none; width: 100%; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 1px solid #eaeaea; padding-right: 0; padding-bottom: 0.5rem; }
      .tab-btn { border-left: none; border-bottom: 3px solid transparent; text-align: center; white-space: nowrap; }
      .tab-btn.active { border-left-color: transparent; border-bottom-color: var(--charcoal); }
    }
  </style>
  <script type="module" crossorigin src="/assets/account-FHHZeAci.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/common-BBPTEEuR.js">
  <link rel="stylesheet" crossorigin href="/assets/style-DWs-L9PZ.css">
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="main-nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="dot"></span> Bare Minimum
      </a>
      <div class="nav-links" id="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="tracking.html">Track Order</a>
                <a href="cart.html" class="nav-cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 01-8 0"/>
          </svg>
          <span class="cart-badge">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="account-container">
    <div class="account-header">
      <h1>My Account</h1>
      <p id="user-greeting" style="color: #666;"></p>
    </div>

    <div class="account-layout">
      
      <!-- Left-hand Sidebar Menu -->
      <aside class="account-sidebar">
        <button class="tab-btn active" onclick="switchTab('profile')">Profile details</button>
        <button class="tab-btn" onclick="switchTab('orders')">Order history</button>
        <button class="tab-btn" onclick="switchTab('address')">Saved address</button>
      </aside>

      <!-- Main Content Area -->
      <div class="account-content-area">
        
        <!-- Profile Section -->
        <div id="tab-profile" class="tab-content active" style="max-width: 500px;">
          <form onsubmit="event.preventDefault(); submitProfile();" style="margin-top: 0.5rem;">
            <div class="form-group" style="margin-bottom: 1rem;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">Name</label>
              <input type="text" id="profile-name" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">Email (Optional)</label>
              <input type="email" id="profile-email" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">Date of Birth</label>
              <input type="date" id="profile-dob" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div class="form-group" style="margin-bottom: 1.5rem;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">Phone</label>
              <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="profile-phone" style="flex: 1; padding: 0.75rem; border: 1px solid #eee; border-radius: 4px; background: #fafafa;" disabled>
                <button type="button" class="btn" style="padding: 0.75rem 1rem;" onclick="togglePhoneChange()">Change</button>
              </div>
            </div>
            
            <!-- Hidden Phone Change Section -->
            <div id="phone-change-section" style="display: none; padding: 1.5rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 1.5rem; background: #fafafa;">
              <h4 style="margin-top: 0; margin-bottom: 1rem; color: var(--charcoal);">Update Phone Number</h4>
              <div class="form-group" style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">New Phone Number</label>
                <div style="display: flex; gap: 0.5rem;">
                  <input type="text" id="new-phone-input" placeholder="10-digit number" style="flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                  <button type="button" id="btn-send-otp" class="btn" onclick="requestPhoneOtp()">Send OTP</button>
                </div>
              </div>
              <div id="phone-otp-section" class="form-group" style="margin-bottom: 1rem; display: none;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">Enter OTP</label>
                <div style="display: flex; gap: 0.5rem;">
                  <input type="text" id="new-phone-otp" placeholder="6-digit OTP" style="flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                  <button type="button" id="btn-verify-otp" class="btn btn-primary" onclick="verifyPhoneOtp()">Verify & Update</button>
                </div>
              </div>
              <button type="button" class="btn" style="background: #ccc; color: #333;" onclick="togglePhoneChange()">Cancel</button>
            </div>
            <button type="submit" class="btn btn-primary">Save Profile</button>
          </form>
        </div>

        <!-- Orders Section -->
        <div id="tab-orders" class="tab-content">
          <div id="orders-list" style="margin-top: 0.5rem;">
            <p>Loading your orders...</p>
          </div>
        </div>

        <!-- Saved Address Section -->
        <div id="tab-address" class="tab-content" style="max-width: 600px;">
          <form onsubmit="event.preventDefault(); submitProfile();" style="margin-top: 0.5rem;">
            <div class="form-group" style="margin-bottom: 1rem;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">Address Line 1</label>
              <input type="text" id="address-1" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">Address Line 2 (Optional)</label>
              <input type="text" id="address-2" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
              <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">City</label>
                <input type="text" id="address-city" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
              </div>
              <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">State</label>
                <input type="text" id="address-state" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
              </div>
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
              <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">Pincode</label>
                <input type="text" id="address-pincode" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;" maxlength="6" pattern="^\d{6}$">
                <small id="address-serviceability-msg" style="display: block; margin-top: 0.25rem; font-size: 0.85rem; font-weight: 500;"></small>
              </div>
              <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: #555;">Landmark</label>
                <input type="text" id="address-landmark" style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Save Address</button>
          </form>
        </div>
      
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // 1. Check if user is logged in
      const localUser = auth.getCurrentUser();
      if (!localUser) {
        window.location.href = 'login.html';
        return;
      }

      document.getElementById('user-greeting').textContent = `Welcome back, ${localUser.name || localUser.email || localUser.phone || 'Guest'}.`;

      // Pincode Verification Logic
      const pincodeInput = document.getElementById('address-pincode');
      const serviceabilityMsg = document.getElementById('address-serviceability-msg');
      if (pincodeInput && serviceabilityMsg) {
        pincodeInput.addEventListener('input', async (e) => {
          const pin = e.target.value.trim();
          if (pin.length === 6 && /^\d{6}$/.test(pin)) {
            serviceabilityMsg.textContent = 'Checking delivery status...';
            serviceabilityMsg.style.color = '#666';
            try {
              const res = await fetch(`/api/logistics/pincode/${pin}`);
              const data = await res.json();
              if (data.serviceable || (data.success && data.city)) {
                // Autofill city and state if available
                if (data.city) document.getElementById('address-city').value = data.city;
                if (data.state) document.getElementById('address-state').value = data.state;
              }
              
              if (data.serviceable) {
                serviceabilityMsg.textContent = `✓ Delivery available (Est. ${data.estimated_days_min}-${data.estimated_days_max} days)`;
                serviceabilityMsg.style.color = '#2e7d32';
              } else if (data.success && !data.serviceable) {
                serviceabilityMsg.textContent = 'Sorry, we do not deliver to this pincode.';
                serviceabilityMsg.style.color = '#d32f2f';
              } else {
                serviceabilityMsg.textContent = data.message || 'Invalid pincode.';
                serviceabilityMsg.style.color = '#d32f2f';
              }
            } catch (err) {
              console.error('Pincode check error:', err);
              serviceabilityMsg.textContent = 'Error verifying pincode.';
              serviceabilityMsg.style.color = '#d32f2f';
            }
          } else {
            serviceabilityMsg.textContent = '';
          }
        });
      }

      // 1b. Initialize Profile Form with local data first
      document.getElementById('profile-name').value = localUser.name || '';
      document.getElementById('profile-email').value = localUser.email || '';
      document.getElementById('profile-phone').value = localUser.phone || '';

      // 1c. Fetch full user data including addresses from backend
      try {
        const userRes = await auth.fetchWithAuth('/api/users/me');
        if (userRes) {
          const userData = await userRes.json();
          if (userData.success && userData.user) {
            const user = userData.user;
            document.getElementById('profile-name').value = user.name || '';
            document.getElementById('profile-email').value = user.email || '';
            document.getElementById('profile-dob').value = user.dateOfBirth || '';
            
            if (user.addresses && user.addresses.length > 0) {
              const defaultAddr = user.addresses[0];
              document.getElementById('address-1').value = defaultAddr.address1 || '';
              document.getElementById('address-2').value = defaultAddr.address2 || '';
              document.getElementById('address-city').value = defaultAddr.city || '';
              document.getElementById('address-state').value = defaultAddr.state || '';
              document.getElementById('address-pincode').value = defaultAddr.pincode || '';
              document.getElementById('address-landmark').value = defaultAddr.landmark || '';
            }
          }
        }
      } catch (err) {
        console.error('Error fetching full user profile:', err);
      }

      // Expose switchTab function globally
      window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.getAttribute('onclick').includes(tabId));
        if (activeBtn) activeBtn.classList.add('active');
        
        document.getElementById(`tab-${tabId}`).classList.add('active');
      };

      window.togglePhoneChange = function() {
        const section = document.getElementById('phone-change-section');
        section.style.display = section.style.display === 'none' ? 'block' : 'none';
        document.getElementById('new-phone-input').value = '';
        document.getElementById('new-phone-otp').value = '';
        document.getElementById('phone-otp-section').style.display = 'none';
      };

      window.requestPhoneOtp = async function() {
        const newPhone = document.getElementById('new-phone-input').value.trim();
        if (!newPhone || newPhone.length < 10) return alert('Enter a valid phone number');
        
        try {
          // Temporarily disable auth headers just to request OTP if necessary, but request-otp is public anyway
          const res = await fetch('/api/auth/request-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: newPhone })
          });
          const data = await res.json();
          if (data.success) {
            alert('OTP sent to new number!');
            document.getElementById('phone-otp-section').style.display = 'block';
          } else {
            alert(data.message || 'Failed to send OTP');
          }
        } catch(e) {
          alert('Error sending OTP');
        }
      };

      window.verifyPhoneOtp = async function() {
        const newPhone = document.getElementById('new-phone-input').value.trim();
        const otp = document.getElementById('new-phone-otp').value.trim();
        if (!otp) return alert('Enter OTP');

        try {
          const res = await auth.fetchWithAuth('/api/users/me/update-phone', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ newPhone, otp })
          });
          const data = await res.json();
          if (data.success) {
            alert('Phone number updated successfully!');
            document.getElementById('profile-phone').value = newPhone;
            
            const localUser = auth.getCurrentUser();
            const updatedUser = { ...localUser, phone: newPhone };
            auth.setSession({ accessToken: auth.token, refreshToken: auth.refreshToken }, updatedUser);
            
            togglePhoneChange();
          } else {
            alert(data.message || 'Failed to update phone number');
          }
        } catch(e) {
          alert('Error updating phone number');
        }
      };

      window.submitProfile = async function() {
        const name = document.getElementById('profile-name').value.trim();
        const email = document.getElementById('profile-email').value.trim();
        const dateOfBirth = document.getElementById('profile-dob').value;
        
        const address = {
          address1: document.getElementById('address-1').value.trim(),
          address2: document.getElementById('address-2').value.trim(),
          city: document.getElementById('address-city').value.trim(),
          state: document.getElementById('address-state').value.trim(),
          pincode: document.getElementById('address-pincode').value.trim(),
          landmark: document.getElementById('address-landmark').value.trim()
        };
        
        // Only include address in payload if address1, city, state, and pincode are provided
        const hasAddress = address.address1 && address.city && address.state && address.pincode;

        try {
          const res = await auth.fetchWithAuth('/api/users/me', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, dateOfBirth, ...(hasAddress ? { address } : {}) })
          });
          const data = await res.json();
          if (data.success) {
            alert('Profile updated successfully!');
            // Update local storage user object
            const updatedUser = { ...localUser, name, email, dateOfBirth };
            const session = JSON.parse(localStorage.getItem('bare_minimum_session'));
            auth.setSession({ accessToken: auth.token, refreshToken: auth.refreshToken }, updatedUser);
            document.getElementById('user-greeting').textContent = `Welcome back, ${updatedUser.name || updatedUser.email || updatedUser.phone}.`;
          } else {
            alert(data.message || 'Failed to update profile');
          }
        } catch (e) {
          alert('Error updating profile');
        }
      };

      // 2. Fetch orders
      try {
        const response = await auth.fetchWithAuth('/api/orders/me');
        if (!response) return;
        
        const data = await response.json();
        const ordersList = document.getElementById('orders-list');

        if (!data.success) {
          ordersList.innerHTML = `<p style="color: red;">Failed to load orders: ${data.message}</p>`;
          return;
        }

        if (data.orders.length === 0) {
          ordersList.innerHTML = '<p>You have not placed any orders yet.</p><a href="shop.html" class="btn" style="display: inline-block; margin-top: 1rem;">Start Shopping</a>';
          return;
        }

        ordersList.innerHTML = '';
        data.orders.forEach(order => {
          ordersList.innerHTML += renderOrderCard(order);
        });

      } catch (err) {
        document.getElementById('orders-list').innerHTML = `<p style="color: red;">Error connecting to server.</p>`;
      }
    });

    function renderOrderCard(order) {
      const date = new Date(order.date).toLocaleDateString();
      const itemsText = order.items.map(i => `${i.quantity}x ${i.name}`).join(', ');
      
      const statuses = ['created', 'placed', 'processing', 'shipped', 'delivered'];
      // Handle missing or invalid status fallback
      const currentIndex = Math.max(0, statuses.indexOf(order.status));
      
      let timelineHTML = '<div class="status-timeline">';
      ['Placed', 'Processing', 'Shipped', 'Delivered'].forEach((label, idx) => {
        // 'created' is index 0. 'placed' is 1, mapping to Placed (idx 0).
        const stepIndex = idx + 1; 
        const isCompleted = currentIndex >= stepIndex;
        const isActive = currentIndex === stepIndex;
        const stateClass = isCompleted ? 'completed' : (isActive ? 'active' : '');
        
        let iconHTML = '';
        if (isCompleted && !isActive) {
          iconHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>';
        }

        timelineHTML += `
          <div class="status-step ${stateClass}">
            <div class="status-dot">${iconHTML}</div>
            <div class="status-label">${label}</div>
          </div>
        `;
      });
      timelineHTML += '</div>';

      return `
        <div class="order-card" id="order-${order.id}">
          <div class="order-header">
            <div>
              <h3>Order #${order.id}</h3>
              <div class="order-meta">Placed on ${date} • ₹${order.amount}</div>
            </div>
            <a href="invoice.html?id=${order.id}" style="color: var(--charcoal); font-weight: 500; font-size: 0.9rem;">View Invoice</a>
          </div>
          <div style="font-size: 0.95rem; margin-bottom: 1rem; color: #444;">
            <strong>Items:</strong> ${itemsText}
          </div>
          ${timelineHTML}
          
          <!-- DEV ONLY: Advance Status -->
          <div style="text-align: right; margin-top: 1rem;">
            <button class="btn-demo-advance" onclick="advanceOrderStatus('${order.id}')">Demo: Advance Status</button>
          </div>
        </div>
      `;
    }

    async function advanceOrderStatus(orderId) {
      try {
        const response = await auth.fetchWithAuth(`/api/orders/demo-advance/${orderId}`, {
          method: 'POST'
        });
        const data = await response.json();
        if (data.success) {
          window.location.reload();
        } else {
          alert('Failed to advance status');
        }
      } catch (e) {
        alert('Network error');
      }
    }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</body>
</html>
